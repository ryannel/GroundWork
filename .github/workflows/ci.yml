name: CI

# Fast, deterministic, blocking gates — the green "build". Every job just calls a
# `./dev` target, so `./dev ci` locally reproduces this exact build. The heavy
# real-stack boot lives in integration.yml (non-blocking), not here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - run: ./dev test generation

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - run: ./dev lint skills
      - run: ./dev test contracts
      - run: ./dev test cli

  compilation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # python-microservice cases shell out to `uv`; Next.js and docs-site
      # cases shell out to `pnpm`. Go is preinstalled on the runner image.
      - run: npm ci
      - run: ./dev test compilation
