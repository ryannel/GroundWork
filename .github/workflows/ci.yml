name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: ./dev test generation

  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: ./dev lint skills
      - run: ./dev test contracts
      - run: ./dev test cli

  compilation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # python-microservice cases shell out to `uv`; Next.js and docs-site
      # cases shell out to `pnpm`. Go is preinstalled on the runner image.
      - run: npm ci
      - run: ./dev test compilation

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The nextjs-app generator runs `pnpm install` at generation time to
      # produce the pnpm-lock.yaml the frontend Dockerfile builds from. Without
      # pnpm on PATH that install fails silently, no lockfile is written, and
      # `docker compose up` fails the frozen-lockfile frontend build.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: npm ci
      - name: Build generators
        run: npm run build
      # GitHub ubuntu runners ship Docker; the dev stack boots directly.
      - name: End-to-end scaffold + harness
        env:
          GROUNDWORK_REQUIRE_SERVICES: '1'
          GROUNDWORK_REQUIRE_TRACES: '1'
        run: ./dev test scaffolds

  # OPTIONAL — requires LLM API keys; gated to nightly / label, NOT required.
  # Enable by adding secrets and uncommenting. Documented here per Phase 0 design.
