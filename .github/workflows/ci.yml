name: CI

# The build is a single command — `./dev ci` — run with the pinned toolchain.
# CI runs exactly that, so running `./dev ci` locally reproduces the GitHub build
# byte for byte (lint + generation + contracts + cli + compilation). The
# heavyweight real-stack boot lives in integration.yml (nightly/manual), not here.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      # The whole required build, identical to local `./dev ci`.
      # (Go + uv + pnpm back the compilation gate; Node + uv back the rest.)
      - run: ./dev ci
