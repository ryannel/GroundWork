# Publishes the npm package when a version tag is pushed.
#
# Release procedure (also in the contributor guide's Release Checklist):
#   1. Move the Unreleased section of CHANGELOG.md under the new version heading.
#   2. npm version <minor|patch> --no-git-tag-version, commit, then tag vX.Y.Z and push the tag.
#   3. This workflow gates on the full `./dev ci` build, then publishes.
#
# The package publishes as `groundwork-method` (decision 2026-06-10: the bare name
# `groundwork` is held by an unrelated package; the -method suffix matches the
# category convention). The bin stays `groundwork`.
#
# Auth is npm **trusted publishing** (OIDC) — no NPM_TOKEN secret. It requires a
# trusted publisher to be configured for the package on npmjs.com (Settings →
# Trusted Publisher): organisation `ryannel`, repository `GroundWork`, workflow
# `release.yml`. OIDC also attaches build provenance automatically. Because npm
# only lets you configure a trusted publisher once the package exists, the very
# first publish had to be bootstrapped (see the Release Checklist).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm trusted publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      # NB: no `registry-url` — it makes setup-node write an .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}`. With no token that empty credential
      # shadows OIDC: npm tries it and 404s instead of trusted publishing.
      # Omitting it leaves no auth configured, so npm uses OIDC. The default
      # registry is already registry.npmjs.org.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      # Trusted publishing needs npm >= 11.5.1; Node 22's bundled npm is older.
      - run: npm install -g npm@latest
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false
      - run: npm ci
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION" >&2
            exit 1
          fi
      - name: Verify CHANGELOG has an entry for this version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          grep -q "^## \[$TAG_VERSION\]" CHANGELOG.md || {
            echo "CHANGELOG.md has no entry for $TAG_VERSION" >&2
            exit 1
          }
      # Gate the publish on the same required build CI runs (and that you can run
      # locally with `./dev ci`).
      - name: Build + required gates
        run: ./dev ci
      # No token: npm detects the GitHub OIDC identity and exchanges it for a
      # short-lived publish credential. --provenance signs the build provenance.
      - name: Publish
        run: npm publish --provenance
