version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=tasklet
      - POSTGRES_PASSWORD=tasklet
      - POSTGRES_DB=tasklet
    ports:
      - "5432:5432"

  api:
    build: ./services/api
    environment:
      - PORT=4000
      - DATABASE_URL=postgres://tasklet:tasklet@db:5432/tasklet?sslmode=disable
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build: ./services/web
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
